name: Real Stock Research

on:
  workflow_dispatch:
    inputs:
      start:
        description: Backtest start date
        required: true
        default: "2018-01-01"

permissions:
  contents: write

jobs:
  aggressive-variants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run aggressive variant research
        run: python research/real_stock_strategy.py --research --start "${{ inputs.start }}"

      - name: Commit research outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/out/
          git diff --cached --quiet || git commit -m "Update aggressive strategy research"
          git push

