name: Real Stock Alert

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Scan mode
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly
          - manual

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python script.py "${{ inputs.mode }}"

      - name: Commit updated state and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add position_state.json reports/
          git diff --cached --quiet || git commit -m "Update real stock alert report"
          git push

